<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Landmarks · Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #0a0f1e, #03050b);
            font-family: 'SF Distant Galaxy', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        @font-face {
            font-family: 'SF Distant Galaxy';
            src: local('SF Distant Galaxy'), url('fonts/SF\ Distant\ Galaxy.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* ---- heading ---- */
        .hero-title {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 30px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 100, 0, 0.15));
            backdrop-filter: blur(8px);
            border-radius: 60px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }

        .hero-title h1 {
            font-size: 2.8rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: #fff4d6;
            text-shadow: 0 0 20px #ffb347, 0 0 40px #ff7e05;
        }

        .hero-title p {
            color: #b9b9d6;
            letter-spacing: 3px;
            font-size: 1rem;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* ---- card grid ---- */
        .card-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 35px;
            max-width: 1100px;
            width: 100%;
        }

        .card {
            flex: 1 1 220px;
            min-width: 200px;
            max-width: 280px;
            background: linear-gradient(145deg, rgba(30, 30, 50, 0.7), rgba(10, 10, 20, 0.9));
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 28px 18px 24px;
            border: 1px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7), 0 0 15px rgba(255, 215, 0, 0.1);
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: #ffd966;
            box-shadow: 0 25px 50px rgba(255, 215, 0, 0.3), 0 0 30px #ffb347;
            background: linear-gradient(145deg, rgba(50, 45, 70, 0.8), rgba(15, 12, 25, 0.95));
        }

        .card-icon {
            font-size: 4.5rem;
            line-height: 1;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 12px rgba(255, 200, 50, 0.5));
        }

        .card h2 {
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 3px;
            color: #f5e7c8;
            text-shadow: 0 0 10px #ff9f1c;
            margin-bottom: 6px;
        }

        .card .sub {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #afb0d0;
            background: rgba(255, 215, 0, 0.08);
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            backdrop-filter: blur(2px);
        }

        .card .btn-enter {
            margin-top: 18px;
            padding: 8px 26px;
            border-radius: 40px;
            background: linear-gradient(145deg, #f7b731, #d48c1a);
            border: none;
            color: #0b0d15;
            font-weight: bold;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(255, 180, 0, 0.3);
            transition: 0.2s;
            text-transform: uppercase;
            border: 1px solid #ffdd77;
        }

        .card:hover .btn-enter {
            background: linear-gradient(145deg, #ffc857, #f5a623);
            box-shadow: 0 0 25px #ffb347;
            transform: scale(1.05);
        }

        /* ---- footer ---- */
        .footer-note {
            margin-top: 50px;
            color: #666a88;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
            padding-top: 25px;
            width: 80%;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .footer-note span {
            color: #d4b06a;
        }

        @media (max-width: 700px) {
            .hero-title h1 {
                font-size: 2rem;
                letter-spacing: 3px;
            }
            .card-grid {
                gap: 25px;
            }
            .card {
                min-width: 160px;
                padding: 20px 12px;
            }
            .card-icon {
                font-size: 3.5rem;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                padding: 12px 18px;
            }
            .hero-title h1 {
                font-size: 1.6rem;
            }
            .card {
                flex: 1 1 140px;
                min-width: 130px;
            }
        }

        .card {
            animation: floatGlow 4s ease-in-out infinite alternate;
        }
        .card:nth-child(2) { animation-delay: 0.4s; }
        .card:nth-child(3) { animation-delay: 0.8s; }

        @keyframes floatGlow {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-6px); }
        }
        .card:hover {
            animation-play-state: paused;
        }
    </style>
</head>
<body>

    <div class="hero-title">
        <h1>✦ 3D LANDMARKS ✦</h1>
        <p>explore iconic places · interactive models</p>
    </div>

    <div class="card-grid">
        <!-- Eiffel Tower -->
        <a href="./1.Eiffel tower/index.html" class="card">
            <div class="card-icon">🗼</div>
            <h2>Eiffel</h2>
            <div class="sub">Paris · France</div>
            <div class="btn-enter">Explore</div>
        </a>

        <!-- Luxor Obelisk -->
        <a href="./2.Luxor(مسلة)/index.html" class="card">
            <div class="card-icon">🏛️</div>
            <h2>Luxor</h2>
            <div class="sub">مسلة الأقصر · Egypt</div>
            <div class="btn-enter">Explore</div>
        </a>

        <!-- Colosseum -->
        <a href="./3. Colosseum/index.html" class="card">
            <div class="card-icon">🏟️</div>
            <h2>Colosseum</h2>
            <div class="sub">Rome · Italy</div>
            <div class="btn-enter">Explore</div>
        </a>
    </div>

    <div class="footer-note">
        <span>✦</span> click any card to explore in 3D <span>✦</span>
    </div>

</body>
</html>
